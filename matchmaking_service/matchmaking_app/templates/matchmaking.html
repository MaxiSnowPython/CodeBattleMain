{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CodeBattle - Поиск игры</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');

    :root {
        --sidebar-width: 220px;
        --bg-primary: #000000;
        --bg-secondary: #0a0a0a;
        --bg-card: #101010;
        --bg-card-hover: #1a1a1a;
        --border-color: #1c1c1c;
        --border-hover: #2a2a2a;
        --text-primary: #e7e9ea;
        --text-secondary: #71767b;
        --text-muted: #3b3b3b;
        --accent: #a970ff;
        --accent-dim: rgba(169, 112, 255, 0.08);
        --accent-glow: rgba(169, 112, 255, 0.2);
        --accent-solid: rgba(169, 112, 255, 0.15);
        --danger: #f4212e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 40px 20px;
        background: var(--bg-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-left: calc(var(--sidebar-width) + 40px);
        transition: all 0.3s ease;
        color: var(--text-primary);
    }

    .container {
        max-width: 560px;
        width: 100%;
    }

    /* ===== HEADER ===== */
    .header {
        background: var(--bg-card);
        padding: 48px 28px 40px;
        border-radius: 16px;
        text-align: center;
        margin-bottom: 16px;
        border: 1px solid var(--border-color);
        position: relative;
        overflow: hidden;
    }

    .header::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        opacity: 0.6;
    }

    .header h1 {
        font-family: 'Inter', sans-serif;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--text-primary);
        margin-bottom: 6px;
    }

    .header p {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: var(--text-secondary);
    }

    /* ===== WELCOME ===== */
    .welcome-text {
        background: var(--bg-card);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 16px;
        border: 1px solid var(--border-color);
        text-align: center;
    }

    .welcome-text h2 {
        color: var(--text-secondary);
        margin-bottom: 14px;
        font-size: 12px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-family: 'JetBrains Mono', monospace;
    }

    .greeting {
        color: var(--text-primary);
        font-size: 14px;
        padding: 14px 18px;
        background: var(--bg-secondary);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        font-family: 'JetBrains Mono', monospace;
    }

    .greeting::before {
        content: '>';
        color: var(--accent);
        margin-right: 8px;
        font-weight: 700;
    }

    .greeting strong {
        color: var(--accent);
        font-weight: 700;
    }

    /* ===== SEARCH BLOCK ===== */
    #search-block {
        text-align: center;
        background: var(--bg-card);
        border-radius: 16px;
        padding: 48px 28px;
        border: 1px solid var(--border-color);
    }

    #find-btn {
        background: var(--accent);
        color: #ffffff;
        padding: 14px 48px;
        border: none;
        border-radius: 9999px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.2px;
        transition: all 0.2s ease;
        font-family: 'Inter', sans-serif;
        position: relative;
    }

    #find-btn:hover {
        background: #b985ff;
        box-shadow: 0 0 24px var(--accent-glow), 0 0 80px rgba(169, 112, 255, 0.08);
        transform: scale(1.02);
    }

    #find-btn:active {
        transform: scale(0.98);
    }

    /* ===== STATUS BLOCK ===== */
    #status-block {
        text-align: center;
        background: var(--bg-card);
        border-radius: 16px;
        padding: 48px 28px;
        border: 1px solid var(--border-color);
    }

    #status {
        color: var(--accent);
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 28px;
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    .loader {
        margin: 0 auto;
        width: 40px;
        height: 40px;
        border: 2px solid var(--border-color);
        border-top: 2px solid var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        box-shadow: 0 0 12px var(--accent-glow);
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .hidden { display: none; }

    .fade-in {
        animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        width: var(--sidebar-width);
        background: var(--bg-primary);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        padding: 0;
        z-index: 1000;
    }

    .sidebar-header {
        padding: 28px 24px;
        border-bottom: 1px solid var(--border-color);
        font-weight: 700;
        font-size: 18px;
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        letter-spacing: -0.3px;
    }

    .nav-item {
        text-decoration: none;
        color: var(--text-secondary);
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 15px;
        font-weight: 500;
        transition: all 0.15s ease;
        border-radius: 0;
        font-family: 'Inter', sans-serif;
    }

    .nav-item:hover {
        background: var(--bg-card-hover);
        color: var(--text-primary);
    }

    .nav-item.active {
        background: var(--accent-dim);
        color: var(--accent);
        border-right: 2px solid var(--accent);
    }

    .nav-item .icon {
        font-size: 18px;
        width: 24px;
        text-align: center;
        opacity: 0.85;
    }

    .sidebar-footer {
        margin-top: auto;
        padding: 0;
        border-top: 1px solid var(--border-color);
    }

    .sidebar-footer .nav-item {
        color: var(--text-muted);
    }

    .sidebar-footer .nav-item:hover {
        color: var(--danger);
        background: rgba(244, 33, 46, 0.05);
    }

    /* ===== BOTTOM NAV (mobile) ===== */
    .bottom-nav {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(12px);
        display: none;
        justify-content: space-around;
        padding: 10px 0;
        z-index: 1000;
        border-top: 1px solid var(--border-color);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
        body { padding-left: 20px; }
        .sidebar { display: none; }
        .bottom-nav { display: flex; }
    }
    /* ===== LANGUAGE SELECTOR ===== */
    .lang-section {
        margin-bottom: 16px;
    }

    .lang-label {
        text-align: center;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: var(--text-muted);
        margin-bottom: 14px;
    }

    .lang-grid {
        display: flex;
        justify-content: center;
        gap: 12px;
    }

    .lang-item {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
    }

    .lang-item::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0;
        transition: opacity 0.2s ease;
    }

    .lang-item:hover {
        border-color: var(--accent);
        transform: translateY(-3px);
        box-shadow: 0 8px 24px var(--accent-glow);
    }

    .lang-item:hover::before {
        opacity: 0.08;
    }

    .lang-item:hover .lang-icon {
        transform: scale(1.1);
    }

    .lang-icon {
        font-size: 28px;
        line-height: 1;
        transition: transform 0.2s ease;
        position: relative;
        z-index: 1;
    }

    .lang-icon.python { color: #3776ab; }
    .lang-icon.cpp { color: #00599c; }
    .lang-icon.java { color: #ed8b00; }
    .lang-icon.js { color: #f7df1e; }

    .lang-name {
        position: absolute;
        bottom: -24px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: var(--text-muted);
        white-space: nowrap;
        opacity: 0;
        transition: all 0.2s ease;
    }

    .lang-item:hover .lang-name {
        opacity: 1;
        color: var(--accent);
        bottom: -22px;
    }

    .lang-wrapper {
        position: relative;
        padding-bottom: 8px;
    }
</style>
</head>
<body>

        <div class="welcome-text">
            <h2>System Online</h2>
            <div class="greeting">
                Приветствую, <strong id="player-nick">{{username}}</strong>
            </div>
        </div>
        
        <div id="search-block">
            <button id="find-btn" onclick="startSearch()">Начать поиск</button>
        </div>

        <div id="status-block" class="hidden">
            <p id="status">Поиск противника...</p>
            <div class="loader"></div>
        </div>
    </div>

<script>
let socket = null;
function startSearch() {
    const btn = document.getElementById('find-btn');
    btn.disabled = true;  // сразу блокируем

    document.getElementById('search-block').classList.add('hidden');
    document.getElementById('status-block').classList.remove('hidden');

    socket = new WebSocket("ws://match.codebattle.local:8001/ws/match/");

    socket.onopen = function () {
        socket.send(JSON.stringify({ action: "find_match" }));
    };

    socket.onmessage = function (e) {
        const data = JSON.parse(e.data);
        if (data.action === "redirect") {
            window.location.href = data.url;
        }
    };

    socket.onerror = function() {
        btn.disabled = false;
        document.getElementById('search-block').classList.remove('hidden');
        document.getElementById('status-block').classList.add('hidden');
    };
}
</script>
