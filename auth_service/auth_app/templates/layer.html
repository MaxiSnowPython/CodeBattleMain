{% load static i18n %}
<!DOCTYPE html>
<html lang="{% get_current_language %}">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>CodeBattle Auth</title>
    <script type="module" src="{% static 'js/auth.js' %}"></script>
    <link rel="stylesheet" href="{% block css %}{% endblock css %}">
    {% block head %}{% endblock head %}
    <style>
    .lang-switcher {
        position: fixed;
        top: 16px;
        right: 16px;
        display: flex;
        gap: 4px;
        z-index: 1000;
    }
    .lang-switcher button {
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        color: white;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        transition: background 0.2s;
    }
    .lang-switcher button:hover { background: rgba(255,255,255,0.3); }
    .lang-switcher button.active { background: rgba(255,255,255,0.4); }
    </style>
</head>

<body>

    {% get_current_language as current_lang %}
    <form class="lang-switcher" action="/i18n/setlang/" method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.get_full_path }}">
        <button type="submit" name="language" value="en" {% if current_lang == 'en' %}class="active"{% endif %}>EN</button>
        <button type="submit" name="language" value="ru" {% if current_lang == 'ru' %}class="active"{% endif %}>RU</button>
    </form>

    <div class="container">
        {% block content %} {% endblock content %}
    </div>

</body>


</html>
